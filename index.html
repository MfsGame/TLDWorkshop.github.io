let currentLang = 'zh';
const textBox = document.getElementById('textBox');
const modal = document.getElementById('modal');
const modalText = document.getElementById('modalText');
const visitEl = document.getElementById('visit');
const agreementModal = document.getElementById('agreementModal');
const agreementContent = document.getElementById('agreementContent');
const themeToggle = document.getElementById('themeToggle');
let isLightMode = false;
let textIndex = 0, textTimer;

themeToggle.addEventListener('click', () => {
  isLightMode = !isLightMode;
  document.body.classList.toggle('light-mode', isLightMode);
  if (isLightMode) {
    themeToggle.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
  } else {
    themeToggle.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
  }
});

function renderLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (i18n[currentLang][k]) el.textContent = i18n[currentLang][k];
  });
  document.title = i18n[currentLang].title;
  restartText();
  renderDevMsg();
  agreementContent.textContent = i18n[currentLang].agreement_content;
}
function restartText() {
  clearInterval(textTimer);
  textIndex = 0;
  updateText();
  textTimer = setInterval(updateText, 3000);
}
function updateText() {
  const arr = i18n[currentLang].texts;
  textBox.textContent = arr[textIndex % arr.length];
  textIndex++;
}
function addVisit() {
  let cnt = localStorage.getItem('visit') || 0;
  cnt++;
  localStorage.setItem('visit', cnt);
  visitEl.textContent = `${i18n[currentLang].visit}：${cnt}`;
}
function renderDevMsg() {
  modalText.innerHTML = '';
  i18n[currentLang].devMsg.forEach((t, i) => {
    const div = document.createElement('div');
    div.style.marginBottom = '6px';
    div.textContent = (i+1) + '. ' + t;
    modalText.appendChild(div);
  });
}

function openModal(modalEl) {
  modalEl.style.display = 'flex';
  setTimeout(() => modalEl.classList.add('show'), 10);
}
function closeModal(modalEl) {
  modalEl.classList.remove('show');
  setTimeout(() => modalEl.style.display = 'none', 300);
}

document.addEventListener('DOMContentLoaded', () => {
  renderLang();
  addVisit();

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLang = btn.dataset.lang;
      renderLang();
      visitEl.textContent = `${i18n[currentLang].visit}：${localStorage.getItem('visit')||0}`;
    });
  });

  document.querySelector('.signature-btn').onclick = () => openModal(modal);
  document.querySelector('.agreement-btn').onclick = () => openModal(agreementModal);
  document.querySelectorAll('.modal-close').forEach(btn => {
    btn.onclick = () => { closeModal(modal); closeModal(agreementModal); };
  });
  modal.onclick = (e) => e.target === modal && closeModal(modal);
  agreementModal.onclick = (e) => e.target === agreementModal && closeModal(agreementModal);

  const floatTrigger = document.getElementById('float-trigger');
  const floatingBlock = document.querySelector('.floating-block');
  floatTrigger.addEventListener('mouseenter', function() {
    floatingBlock.classList.add('up');
    floatingBlock.classList.remove('down');
  });
  floatTrigger.addEventListener('mouseleave', function(e) {
    const isInside = e.relatedTarget && e.relatedTarget.closest('.cube-wrapper');
    if (isInside) return;
    floatingBlock.classList.add('down');
    floatingBlock.classList.remove('up');
  });
});
</script>
</body>
